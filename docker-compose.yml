services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_USE_MOCK=true
      - VITE_USE_LOCAL_MODEL=true
    command: npm run dev -- --host 0.0.0.0

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/models:/app/models
    command: python -c "print('Backend ready'); import time; time.sleep(99999)"
    profiles:
      - dev
